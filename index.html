<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #FFD700;
    --gold-light: #FFE85C;
    --gold-dark: #C8960C;
    --orange: #FF6B00;
    --orange-hot: #FF4500;
    --cream: #FFF5DC;
    --deep-blue: #0A0618;
    --purple-dark: #1A0A2E;
  }

  body {
    font-family: 'Cinzel', serif;
    background: #000;
    overflow-x: hidden;
  }

  /* ─── HERO ─── */
  .hero {
    position: relative;
    width: 100%;
    height: 100vh;
    min-height: 700px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
  }

  .hero-bg {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 80%, rgba(180,80,0,0.35) 0%, transparent 70%),
      radial-gradient(ellipse 60% 40% at 50% 30%, rgba(80,20,180,0.25) 0%, transparent 70%),
      linear-gradient(180deg, #0A0618 0%, #1A0A2E 30%, #2A0A10 65%, #0D0005 100%);
    z-index: 0;
  }

  /* Stars */
  .stars { position: absolute; inset: 0; z-index: 0; pointer-events: none; }
  .star {
    position: absolute; border-radius: 50%; background: white;
    animation: twinkle var(--dur, 3s) ease-in-out infinite var(--delay, 0s);
  }
  @keyframes twinkle {
    0%,100% { opacity: var(--min, 0.2); transform: scale(1); }
    50%      { opacity: 1; transform: scale(1.5); }
  }

  /* Castle SVG */
  .castle-svg {
    position: absolute;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: min(900px, 100%);
    z-index: 1;
    opacity: 0.93;
  }

  /* Castle glow */
  .castle-glow {
    position: absolute;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 600px; height: 220px;
    background: radial-gradient(ellipse 100% 60% at 50% 100%, rgba(255,100,0,0.55) 0%, rgba(255,50,0,0.2) 50%, transparent 80%);
    filter: blur(12px);
    z-index: 2;
    pointer-events: none;
  }

  /* Gems */
  .gems-container { position: absolute; inset: 0; z-index: 3; pointer-events: none; overflow: hidden; }
  .gem {
    position: absolute; top: -60px;
    font-size: var(--size, 24px);
    animation: fall var(--fall-dur, 5s) linear var(--fall-delay, 0s) infinite;
    filter: drop-shadow(0 0 8px var(--glow, #fff));
    opacity: 0.9;
  }
  @keyframes fall {
    0%   { transform: translateY(-60px) rotate(0deg); opacity: 0; }
    5%   { opacity: 0.9; }
    90%  { opacity: 0.8; }
    100% { transform: translateY(105vh) rotate(360deg); opacity: 0; }
  }

  /* Embers */
  .ember {
    position: absolute; border-radius: 50%;
    background: radial-gradient(circle, #FFD700, #FF6B00);
    pointer-events: none; z-index: 2;
    animation: rise var(--rise-dur, 4s) ease-out var(--rise-delay, 0s) infinite;
  }
  @keyframes rise {
    0%   { transform: translate(0,0) scale(1); opacity: 0.9; }
    100% { transform: translate(var(--tx,0), -200px) scale(0); opacity: 0; }
  }

  /* ─── CONTENT ─── */
  .hero-content {
    position: relative; z-index: 10;
    padding: 0 20px; max-width: 920px;
    animation: reveal 1.2s cubic-bezier(.22,1,.36,1) both;
  }
  @keyframes reveal {
    from { opacity: 0; transform: translateY(40px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .crown-deco {
    font-size: 48px; margin-bottom: 8px;
    animation: float 3s ease-in-out infinite;
    display: block;
    filter: drop-shadow(0 0 16px gold);
  }
  @keyframes float {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-10px); }
  }

  .hero-title {
    font-family: 'Cinzel Decorative', cursive;
    font-size: clamp(30px, 5.5vw, 60px);
    font-weight: 900; color: #fff;
    text-shadow: 0 0 20px rgba(255,200,0,0.8), 0 0 60px rgba(255,120,0,0.4), 2px 3px 0 rgba(0,0,0,0.8);
    line-height: 1.1; letter-spacing: 1px; margin-bottom: 18px;
    animation: titleGlow 2.5s ease-in-out infinite alternate;
  }
  @keyframes titleGlow {
    from { text-shadow: 0 0 20px rgba(255,200,0,0.8), 0 0 60px rgba(255,120,0,0.4), 2px 3px 0 rgba(0,0,0,0.9); }
    to   { text-shadow: 0 0 40px rgba(255,220,0,1),   0 0 80px rgba(255,150,0,0.7), 2px 3px 0 rgba(0,0,0,0.9); }
  }

  .hero-offer {
    font-family: 'Cinzel', serif;
    font-size: clamp(18px, 3.2vw, 36px);
    font-weight: 700;
    background: linear-gradient(90deg, var(--gold-dark), var(--gold-light), var(--gold-dark));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; background-size: 200% 100%;
    animation: shimmer 2s linear infinite;
    text-shadow: none;
    margin-bottom: 30px;
  }
  @keyframes shimmer {
    0%   { background-position: 200% center; }
    100% { background-position: -200% center; }
  }

  /* CTA */
  .cta-btn {
    display: inline-flex; align-items: center; gap: 10px;
    background: linear-gradient(135deg, #FF6B00 0%, #FF3D00 50%, #C8300A 100%);
    color: #fff;
    font-family: 'Cinzel Decorative', cursive;
    font-size: clamp(15px, 2.4vw, 22px);
    font-weight: 700;
    padding: 18px 52px;
    border: none; border-radius: 6px;
    cursor: pointer; text-decoration: none;
    letter-spacing: 1px;
    box-shadow: 0 0 0 3px rgba(255,200,0,0.5), 0 0 30px rgba(255,100,0,0.7), 0 8px 24px rgba(0,0,0,0.5);
    position: relative; overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s;
    animation: btnPulse 2s ease-in-out infinite;
    margin-bottom: 20px;
  }
  .cta-btn::before {
    content: ''; position: absolute;
    top: 0; left: -100%; width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
    animation: btnShine 2.5s linear infinite;
  }
  @keyframes btnShine { 0% { left: -100%; } 100% { left: 200%; } }
  @keyframes btnPulse {
    0%,100% { box-shadow: 0 0 0 3px rgba(255,200,0,0.5), 0 0 30px rgba(255,100,0,0.7), 0 8px 24px rgba(0,0,0,0.5); }
    50%      { box-shadow: 0 0 0 5px rgba(255,220,0,0.8), 0 0 50px rgba(255,150,0,0.9), 0 8px 30px rgba(0,0,0,0.6); }
  }
  .cta-btn:hover { transform: translateY(-3px) scale(1.03); }
  .cta-btn:active { transform: translateY(0) scale(0.98); }

  .hero-subtext {
    font-size: clamp(11px, 1.8vw, 16px);
    color: rgba(255,245,220,0.85);
    letter-spacing: 2px;
    text-shadow: 0 1px 4px rgba(0,0,0,0.7);
    margin-bottom: 36px;
  }

  .divider {
    width: min(500px, 90%); height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 0 auto 28px; opacity: 0.6;
  }

  /* Mini icons */
  .mini-icons {
    display: flex; align-items: center; justify-content: center;
    gap: clamp(12px, 3vw, 32px); flex-wrap: wrap; padding: 0 20px;
  }
  .mini-icon { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .mini-icon .icon-wrap {
    width: clamp(52px, 8vw, 68px); height: clamp(52px, 8vw, 68px);
    background: linear-gradient(135deg, rgba(255,200,0,0.18) 0%, rgba(255,100,0,0.12) 100%);
    border: 1.5px solid rgba(255,200,0,0.35);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: clamp(24px, 4vw, 32px);
    transition: transform 0.3s, border-color 0.3s, box-shadow 0.3s;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
    backdrop-filter: blur(4px);
    position: relative; overflow: hidden;
  }
  .mini-icon .icon-wrap::before {
    content: ''; position: absolute;
    top: 0; left: -100%; width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
    transition: left 0.4s;
  }
  .mini-icon:hover .icon-wrap::before { left: 100%; }
  .mini-icon:hover .icon-wrap {
    transform: translateY(-6px) scale(1.1);
    border-color: var(--gold);
    box-shadow: 0 8px 24px rgba(255,180,0,0.5), 0 0 0 2px rgba(255,200,0,0.2);
  }
  .mini-icon .icon-label {
    font-size: clamp(9px, 1.4vw, 12px); font-weight: 600;
    color: var(--cream); letter-spacing: 1px;
    text-transform: uppercase; opacity: 0.8; white-space: nowrap;
  }

  .icon-sep { width: 4px; height: 4px; border-radius: 50%; background: rgba(255,200,0,0.4); margin-top: -14px; display: none; }
  @media (min-width: 600px) { .icon-sep { display: block; } }

  /* Badge */
  .badge {
    position: absolute; top: 22px; right: 24px; z-index: 20;
    background: linear-gradient(135deg, #FF6B00, #C83000);
    color: #fff; font-size: 11px; font-weight: 700; letter-spacing: 1px;
    padding: 6px 14px; border-radius: 4px;
    border: 1px solid rgba(255,200,0,0.5);
    box-shadow: 0 0 16px rgba(255,100,0,0.5);
    animation: badgePulse 2s ease-in-out infinite;
  }
  @keyframes badgePulse { 0%,100% { opacity:1; } 50% { opacity:0.8; } }
</style>
</head>

<script>
// Stars
const starsEl = document.getElementById('stars');
for (let i = 0; i < 120; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const size = Math.random() * 2.5 + 0.5;
  s.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;top:${Math.random()*70}%;--min:${(Math.random()*0.3+0.1).toFixed(2)};--dur:${(Math.random()*3+2).toFixed(1)}s;--delay:-${(Math.random()*4).toFixed(1)}s;`;
  starsEl.appendChild(s);
}

// Falling gems
const gems = ['💎','💠','🔷','🔵','💜','🔶','🔸','🟡','🟢','⭐','✨','🌟'];
const colors = ['#00BFFF','#BF5FFF','#FFD700','#00FF88','#FF3355','#fff'];
const gemsEl = document.getElementById('gems');
for (let i = 0; i < 28; i++) {
  const g = document.createElement('div');
  g.className = 'gem';
  g.textContent = gems[Math.floor(Math.random()*gems.length)];
  const color = colors[Math.floor(Math.random()*colors.length)];
  const size = Math.random()*20+14;
  g.style.cssText = `left:${Math.random()*100}%;--size:${size}px;--glow:${color};--fall-dur:${(Math.random()*5+4).toFixed(1)}s;--fall-delay:-${(Math.random()*8).toFixed(1)}s;`;
  gemsEl.appendChild(g);
}

// Embers
const embersEl = document.getElementById('embers');
for (let i = 0; i < 18; i++) {
  const e = document.createElement('div');
  e.className = 'ember';
  const size = Math.random()*4+2;
  const tx = (Math.random()*80-40).toFixed(0);
  e.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*50+25}%;bottom:${Math.random()*8}%;--tx:${tx}px;--rise-dur:${(Math.random()*3+2).toFixed(1)}s;--rise-delay:-${(Math.random()*4).toFixed(1)}s;`;
  embersEl.appendChild(e);
}
</script>
